<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EventHub</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
</head>

<body>

    <nav class="navbar navbar-expand-lg bg-white border-bottom fixed-top py-3">
    <div class="container-fluid px-4 px-lg-5">
        
        <!-- Brand -->
        <a class="navbar-brand fw-bold fs-3 text-success" href="#">EventHub</a>

        <!-- Toggler -->
        <button
        class="navbar-toggler border-0 shadow-none"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#mainNavbar"
        aria-controls="mainNavbar"
        aria-expanded="false"
        aria-label="Toggle navigation"
        >
        <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Navbar content -->
        <div class="collapse navbar-collapse" id="mainNavbar">

        <!-- Search bar desktop -->
        <form class="d-none d-lg-flex align-items-center border rounded-pill px-2 py-1 mx-lg-4" role="search">
            <input
            class="form-control border-0 shadow-none"
            type="search"
            placeholder="Search events..."
            aria-label="Search events"
            >
            <span class="text-secondary px-2">|</span>
            <input
            class="form-control border-0 shadow-none"
            type="search"
            placeholder="Location"
            aria-label="Location"
            >
            <button class="btn btn-success rounded-circle ms-2 px-3" type="submit">
            Search
            </button>
        </form>

        <!-- Links -->
        <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-3">
            <li class="nav-item">
            <a class="nav-link fw-semibold" href="#">Find Events</a>
            </li>
            <li class="nav-item">
            <a class="nav-link fw-semibold" href="#">Create Event</a>
            </li>
            <li class="nav-item">
            <a class="nav-link fw-semibold" href="#contact">Contact</a>
            </li>

            <!-- Dropdown -->
            <li class="nav-item dropdown">
            <a
                class="nav-link dropdown-toggle fw-semibold"
                href="#"
                role="button"
                data-bs-toggle="dropdown"
                aria-expanded="false"
            >
                More
            </a>
            <ul class="dropdown-menu dropdown-menu-end">
                <li><a class="dropdown-item" href="#">Sign Up</a></li>
                <li><a class="dropdown-item" href="#">Favorites</a></li>
                <li><a class="dropdown-item" href="#">Language</a></li>
            </ul>
            </li>
        </ul>

        <!-- Search mobile -->
        <form class="d-lg-none mt-3" role="search">
            <input
            class="form-control mb-2"
            type="search"
            placeholder="Search events..."
            aria-label="Search events"
            >
            <input
            class="form-control mb-2"
            type="search"
            placeholder="Location"
            aria-label="Location"
            >
            <button class="btn btn-success w-100" type="submit">Search</button>
        </form>

        </div>
    </div>
    </nav>
  
    <section class="container-fluid px-4 px-lg-5 mt-4">
    <div class="position-relative border rounded-5 overflow-hidden shadow-sm">

        <!-- Collage -->
        <div class="row g-0">

        <div class="col-md-4">
            <img
            src="https://images.unsplash.com/photo-1511578314322-379afb476865?auto=format&fit=crop&w=900&q=80"
            alt="Event people"
            class="img-fluid w-100 h-100 object-fit-cover"
            >
        </div>

        <div class="col-md-3">
            <div class="row g-0 h-100">

            <div class="col-12">
                <img
                src="https://images.unsplash.com/photo-1529156069898-49953e39b3ac?auto=format&fit=crop&w=800&q=80"
                alt="Friends"
                class="img-fluid w-100 h-100 object-fit-cover"
                >
            </div>

            <div class="col-12">
                <img
                src="https://images.unsplash.com/photo-1517457373958-b7bdd4587205?auto=format&fit=crop&w=800&q=80"
                alt="Study group"
                class="img-fluid w-100 h-100 object-fit-cover"
                >
            </div>

            </div>
        </div>

        <div class="col-md-3">
            <img
            src="https://images.unsplash.com/photo-1528605248644-14dd04022da1?auto=format&fit=crop&w=900&q=80"
            alt="Meetup"
            class="img-fluid w-100 h-100 object-fit-cover"
            >
        </div>

        <div class="col-md-2">
            <div class="row g-0 h-100">

            <div class="col-12">
                <img
                src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=800&q=80"
                alt="Outdoor"
                class="img-fluid w-100 h-100 object-fit-cover"
                >
            </div>

            <div class="col-12">
                <img
                src="https://images.unsplash.com/photo-1516280440614-37939bbacd81?auto=format&fit=crop&w=800&q=80"
                alt="Music"
                class="img-fluid w-100 h-100 object-fit-cover"
                >
            </div>

            </div>
        </div>

        </div>

        <!-- Overlay content -->
        <div class="position-absolute top-0 start-0 w-100 h-100 d-flex align-items-center">
        <div class="container-fluid px-4 px-lg-5">

            <div class="row">
            <div class="col-lg-7">

                <div class="bg-white bg-opacity-75 rounded-5 p-4 p-lg-5 shadow">

                <h1 class="display-4 fw-bold mb-3">
                    Where People Connect
                </h1>

                <p class="lead mb-4">
                    Find your people to study, enjoy your hobbies, or just relax for a while.
                </p>

                <a href="#" class="btn btn-success btn-lg rounded-pill px-4">
                    Join EventHub
                </a>

                </div>

            </div>
            </div>

        </div>
        </div>

    </div>
    </section>

    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
    </script>

</body>
</html>
